<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>CV Extractor</h1>
        <p class="hint">Extract text from the current page to use in your CV.</p>
      </div>
      <button id="settings-toggle" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.062 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="settings-panel hidden">
      <label for="api-key-input">OpenAI API Key</label>
      <div class="key-row">
        <input id="api-key-input" type="password" placeholder="sk-..." spellcheck="false" autocomplete="off" />
        <button id="toggle-visibility" class="icon-btn" title="Show / hide key">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 3C5 3 1.73 7.11 1 10c.73 2.89 4 7 9 7s8.27-4.11 9-7c-.73-2.89-4-7-9-7zm0 12a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/>
          </svg>
        </button>
      </div>
      <div id="key-status" class="key-status"></div>
      <button id="save-key-btn" class="secondary-btn">Save key</button>
    </div>

    <button id="extract-btn">Extract</button>
    <div id="result" class="result hidden"></div>

    <button id="analyze-btn" class="analyze-btn hidden" disabled>Analyze</button>
    <div id="analysis" class="analysis hidden"></div>
  </div>
  <script src="ai.js"></script>
  <script src="popup.js"></script>
</body>
</html>
